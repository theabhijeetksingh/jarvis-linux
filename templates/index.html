<!DOCTYPE html>
<html>
<head>
    <title>Jarvis - Linux Assistant</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Courier New', monospace;
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        
        .container {
            background: #1a1a1a;
            border-radius: 10px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.3);
            width: 100%;
            max-width: 800px;
            overflow: hidden;
        }
        
        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px;
            text-align: center;
        }
        
        .header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
        }
        
        .header p {
            opacity: 0.9;
            font-size: 0.9em;
        }
        
        .content {
            padding: 30px;
        }
        
        .input-section {
            margin-bottom: 20px;
        }
        
        .input-group {
            display: flex;
            gap: 10px;
        }
        
        input {
            flex: 1;
            padding: 12px;
            background: #2a2a2a;
            border: 2px solid #667eea;
            color: #fff;
            border-radius: 5px;
            font-family: 'Courier New', monospace;
            font-size: 1em;
        }
        
        input:focus {
            outline: none;
            border-color: #764ba2;
            box-shadow: 0 0 10px rgba(118, 75, 162, 0.3);
        }
        
        button {
            padding: 12px 30px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 1em;
            font-weight: bold;
            transition: transform 0.2s;
        }
        
        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }
        
        button:active {
            transform: translateY(0);
        }
        
        .response-section {
            background: #0a0a0a;
            border: 2px solid #667eea;
            border-radius: 5px;
            padding: 15px;
            margin-bottom: 20px;
            max-height: 300px;
            overflow-y: auto;
        }
        
        .response-item {
            margin-bottom: 15px;
            padding-bottom: 15px;
            border-bottom: 1px solid #333;
        }
        
        .response-item:last-child {
            border-bottom: none;
        }
        
        .command {
            color: #00ff00;
            margin-bottom: 5px;
        }
        
        .jarvis-response {
            color: #667eea;
            margin-bottom: 5px;
        }
        
        .timestamp {
            color: #888;
            font-size: 0.8em;
        }
        
        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            border-bottom: 2px solid #667eea;
        }
        
        .tab-btn {
            padding: 10px 20px;
            background: transparent;
            color: #667eea;
            border: none;
            cursor: pointer;
            border-bottom: 3px solid transparent;
            transition: all 0.3s;
        }
        
        .tab-btn.active {
            color: #fff;
            border-bottom-color: #764ba2;
            background: rgba(102, 126, 234, 0.1);
        }
        
        .tab-content {
            display: none;
        }
        
        .tab-content.active {
            display: block;
        }
        
        .history-text {
            background: #0a0a0a;
            border: 1px solid #667eea;
            padding: 15px;
            border-radius: 5px;
            color: #00ff00;
            font-size: 0.9em;
            max-height: 400px;
            overflow-y: auto;
            white-space: pre-wrap;
            word-break: break-all;
        }
        
        .config-text {
            background: #0a0a0a;
            border: 1px solid #667eea;
            padding: 15px;
            border-radius: 5px;
            color: #667eea;
            font-size: 0.9em;
            max-height: 400px;
            overflow-y: auto;
            white-space: pre-wrap;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🤖 Jarvis</h1>
            <p>Your Linux Assistant</p>
        </div>
        
        <div class="content">
            <!-- Command Input -->
            <div class="input-section">
                <div class="input-group">
                    <input type="text" id="commandInput" placeholder="Enter command (e.g., time, files, calc 5+3)..." autocomplete="off">
                    <button onclick="sendCommand()">Send</button>
                </div>
            </div>
            
            <!-- Tabs -->
            <div class="tabs">
                <button class="tab-btn active" onclick="switchTab('responses')">💬 Responses</button>
                <button class="tab-btn" onclick="switchTab('history')">📜 History</button>
                <button class="tab-btn" onclick="switchTab('config')">⚙️ Config</button>
            </div>
            
            <!-- Responses Tab -->
            <div id="responses" class="tab-content active">
                <div class="response-section" id="responsesList"></div>
            </div>
            
            <!-- History Tab -->
            <div id="history" class="tab-content">
                <button onclick="loadHistory()" style="margin-bottom: 10px;">Load History</button>
                <div class="history-text" id="historyText"></div>
            </div>
            
            <!-- Config Tab -->
            <div id="config" class="tab-content">
                <button onclick="loadConfig()" style="margin-bottom: 10px;">Load Config</button>
                <div class="config-text" id="configText"></div>
            </div>
        </div>
    </div>
    
    <script>
        function sendCommand() {
            const input = document.getElementById('commandInput');
            const command = input.value.trim();
            
            if (!command) return;
            
            fetch('/api/command', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({ command: command })
            })
            .then(response => response.json())
            .then(data => {
                addResponse(data);
                input.value = '';
                input.focus();
            })
            .catch(error => console.error('Error:', error));
        }
        
        function addResponse(data) {
            const responsesList = document.getElementById('responsesList');
            const item = document.createElement('div');
            item.className = 'response-item';
            item.innerHTML = `
                <div class="command">👤 You: ${data.command}</div>
                <div class="jarvis-response">🤖 Jarvis: ${data.response}</div>
                <div class="timestamp">${data.timestamp}</div>
            `;
            responsesList.insertBefore(item, responsesList.firstChild);
        }
        
        function switchTab(tabName) {
            // Hide all tabs
            document.querySelectorAll('.tab-content').forEach(tab => {
                tab.classList.remove('active');
            });
            document.querySelectorAll('.tab-btn').forEach(btn => {
                btn.classList.remove('active');
            });
            
            // Show selected tab
            document.getElementById(tabName).classList.add('active');
            event.target.classList.add('active');
        }
        
        function loadHistory() {
            fetch('/api/history')
            .then(response => response.json())
            .then(data => {
                document.getElementById('historyText').textContent = data.history;
            });
        }
        
        function loadConfig() {
            fetch('/api/config')
            .then(response => response.json())
            .then(data => {
                document.getElementById('configText').textContent = JSON.stringify(data, null, 2);
            });
        }
        
        // Enter key to send command
        document.getElementById('commandInput').addEventListener('keypress', function(event) {
            if (event.key === 'Enter') {
                sendCommand();
            }
        });
        
        // Focus on input
        document.getElementById('commandInput').focus();
    </script>
</body>
</html>
